<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Journal</title>
    <link rel="icon" href="images/favicon.ico" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <h1>Code Journal</h1>
      </div>
    </header>
    <main class="container">
      <div data-view="entry-form" class="form">
        <form>
          <div class="row">
            <div class="column-full">
              <h2>New Entry</h2>
            </div>
          </div>
          <div class="row">
            <div class="column-half">
              <img
                id="placeholder"
                src="images/placeholder-image-square.jpg"
                alt="placeholderImage" />
            </div>
            <div class="column-half">
              <label for="title">Title</label>
              <input type="text" id="title" name="TitleOfImage" required />
              <label for="photourl">Photo URL</label>
              <input type="text" id="photourl" name="PhotoUrl" required />
            </div>
            <div class="column-full">
              <label for="notes">Notes</label>
              <textarea
                id="notes"
                name="notes"
                rows="10"
                cols="10"
                required></textarea>
              <div class="text-right">
                <button type="submit" value="Save">Save</button>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div data-view="entries">
        <h1>Entries</h1>
        <ul id="journal-entries-list">
          <li class="row">
            <div class="column-half">
              <img
                src="images/placeholder-image-square.jpg"
                alt="placeholderImage" />
            </div>
            <div class="column-half">
              <h2>swiss alps</h2>
              <p>a nice winter</p>
            </div>
          </li>
          <li class="row">
            <div class="column-half">
              <img
                src="images/placeholder-image-square.jpg"
                alt="placeholderImage" />
            </div>
            <div class="column-half">
              <h2>swiss alps</h2>
              <p>a nice spring</p>
            </div>
          </li>
          <li class="row">
            <div class="column-half">
              <img
                src="images/placeholder-image-square.jpg"
                alt="placeholderImage" />
            </div>
            <div class="column-half">
              <h2>swiss alps</h2>
              <p>a nice summer</p>
            </div>
          </li>
          <li class="row">
            <div class="column-half">
              <img
                src="images/placeholder-image-square.jpg"
                alt="placeholderImage" />
            </div>
            <div class="column-half">
              <h2>swiss alps</h2>
              <p>a nice autmn</p>
            </div>
          </li>
        </ul>
      </div>
    </main>
    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
